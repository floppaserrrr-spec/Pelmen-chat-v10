<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelmen Desktop V10</title>
    <link rel="manifest" href='data:application/manifest+json,{"name":"Pelmen Chat","short_name":"Pelmen","start_url":".","display":"standalone","background_color":"#0b0e14","theme_color":"#ff9800","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/3443/3443338.png","sizes":"512x512","type":"image/png"}]}'>
    <script src="https://unpkg.com/gun/gun.js"></script>
    <style>
        :root { --bg: #0b0e14; --side: #161922; --acc: #ff9800; --txt: #e0e0e0; --brd: rgba(255,255,255,0.05); }
        * { box-sizing: border-box; font-family: 'SF Pro Display', -apple-system, sans-serif; -webkit-user-select: none; }
        body { margin: 0; background: var(--bg); color: var(--txt); height: 100vh; display: flex; overflow: hidden; }
        #aside { width: 320px; background: var(--side); border-right: 1px solid var(--brd); display: flex; flex-direction: column; flex-shrink: 0; }
        .hdr-brand { padding: 30px 20px; font-weight: 900; color: var(--acc); font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .search-area { padding: 15px; }
        .search-area input { width: 100%; background: #000; border: 1px solid #333; padding: 12px; color: #fff; border-radius: 10px; outline: none; -webkit-user-select: text; }
        #u-list { flex: 1; overflow-y: auto; padding: 10px; }
        .u-card { padding: 15px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 15px; margin-bottom: 6px; border: 1px solid transparent; }
        .u-card:hover { background: rgba(255,255,255,0.04); }
        .u-card.active { background: rgba(255, 152, 0, 0.15); border: 1px solid rgba(255, 152, 0, 0.3); }
        .u-ava { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid transparent; flex-shrink: 0; }
        .active .u-ava { border-color: var(--acc); }
        .u-info { flex: 1; display: flex; flex-direction: column; }
        .u-name { font-size: 15px; font-weight: 700; }
        .u-stat { font-size: 12px; color: #555; }
        .is-on .u-stat { color: #4caf50; font-weight: bold; }
        #main { flex: 1; display: flex; flex-direction: column; background: #080a0f; }
        #chat-hdr { padding: 20px 30px; background: var(--side); border-bottom: 1px solid var(--brd); display: flex; justify-content: space-between; align-items: center; }
        #msgs { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }
        .m-wrap { max-width: 80%; display: flex; gap: 15px; animation: mIn 0.3s ease; }
        .m-wrap.me { align-self: flex-end; flex-direction: row-reverse; }
        .m-bub { padding: 14px 18px; border-radius: 20px; font-size: 15px; background: #1e2129; border: 1px solid #2a2f3d; -webkit-user-select: text; }
        .me .m-bub { background: #232a3b; border-color: #3d465c; }
        .m-meta { font-size: 11px; color: var(--acc); margin-bottom: 6px; font-weight: bold; }
        .m-re-box { font-size: 12px; background: rgba(0,0,0,0.3); padding: 10px; border-left: 3px solid var(--acc); margin-bottom: 10px; border-radius: 6px; }
        #ui-bar { padding: 25px; background: var(--side); border-top: 1px solid var(--brd); }
        #re-preview { display: none; background: #111; padding: 12px; border-left: 4px solid var(--acc); margin-bottom: 15px; border-radius: 8px; position: relative; }
        #emoji-panel { display: none; height: 200px; background: #000; border: 1px solid #333; margin-bottom: 15px; border-radius: 15px; overflow: hidden; }
        .em-tabs { display: flex; background: #1a1a1a; }
        .em-tabs button { flex: 1; padding: 12px; border: none; background: none; color: #fff; cursor: pointer; }
        .em-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; padding: 15px; overflow-y: auto; height: 150px; }
        .in-row { display: flex; align-items: center; gap: 15px; }
        #m-input { flex: 1; background: #000; border: 1px solid #333; padding: 16px; border-radius: 14px; color: #fff; outline: none; -webkit-user-select: text; }
        .icon-btn { cursor: pointer; background: #252a35; border: none; color: #fff; width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .send-btn { background: var(--acc); color: #000; font-weight: 900; }
        #settings-win { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .win-card { background: var(--side); padding: 40px; border-radius: 30px; border: 1px solid var(--acc); width: 350px; text-align: center; }
        .ava-picker { position: relative; width: 120px; height: 120px; margin: 0 auto 20px; border-radius: 50%; overflow: hidden; border: 4px solid var(--acc); }
        .ava-circle { width: 100%; height: 100%; object-fit: cover; }
        .file-overlay { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        @keyframes mIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="aside">
    <div class="hdr-brand">Pelmen V10</div>
    <div style="padding: 0 15px 10px;">
        <button class="icon-btn" style="width:100%; font-size:12px; font-weight:bold; background: #2a2f3d;" onclick="createRoom()">➕ СОЗДАТЬ КОМНАТУ</button>
    </div>
    <div class="search-area"><input type="text" placeholder="Поиск сообщений..." oninput="chatSearch(this.value)"></div>
    <div id="u-list">
        <div class="u-card active" id="btn-global" onclick="join('global', 'Общий чат')">
            <div class="u-ava" style="background:var(--acc); display:flex; align-items:center; justify-content:center; color:#000; font-weight:bold;">G</div>
            <div class="u-info"><span class="u-name">Общий чат</span><span class="u-stat">Публично</span></div>
        </div>
    </div>
    <div style="padding:20px; border-top: 1px solid var(--brd);">
        <button class="icon-btn" style="width:100%; font-size:14px;" onclick="toggleWin(true)">⚙️ ПРОФИЛЬ</button>
    </div>
</div>

<div id="main">
    <div id="chat-hdr">
        <div id="room-title" style="font-weight:bold; font-size:18px;">Общий чат</div>
        <div id="typing-status" style="color:var(--acc); font-size:12px;"></div>
    </div>
    <div id="msgs"></div>
    <div id="ui-bar">
        <div id="re-preview">
            <div id="re-who" style="font-size:12px; font-weight:bold; color:var(--acc);"></div>
            <div id="re-txt" style="font-size:11px; opacity:0.6;"></div>
            <span onclick="cancelRe()" style="position:absolute; right:15px; top:10px; cursor:pointer;">×</span>
        </div>
        <div id="emoji-panel">
            <div class="em-tabs"><button onclick="drawEm('e')">ЭМОДЗИ</button><button onclick="drawEm('s')">СТИКЕРЫ</button></div>
            <div id="em-grid" class="em-grid"></div>
        </div>
        <div class="in-row">
            <button class="icon-btn" onclick="toggleEm()">😊</button>
            <label class="icon-btn">📎<input type="file" hidden onchange="handleFile(this, 'msg')"></label>
            <input type="text" id="m-input" placeholder="Написать..." autofocus autocomplete="off">
            <button class="icon-btn send-btn" onclick="send()">➤</button>
        </div>
    </div>
</div>

<div id="settings-win">
    <div class="win-card">
        <div class="ava-picker">
            <input type="file" class="file-overlay" accept="image/*" onchange="handleFile(this, 'ava')">
            <img id="m-preview" class="ava-circle" src="">
        </div>
        <input type="text" id="m-nick-field" style="width:100%; padding:15px; background:#000; border:1px solid #333; color:#fff; border-radius:12px; margin-bottom:20px; text-align:center;">
        <button onclick="saveProfile()" style="width:100%; padding:15px; background:var(--acc); border:none; border-radius:12px; font-weight:bold; cursor:pointer;">СОХРАНИТЬ</button>
        <p onclick="toggleWin(false)" style="margin-top:20px; cursor:pointer; font-size:14px; opacity:0.5;">Отмена</p>
    </div>
</div>

<script>
    // РАСШИРЕННЫЙ СПИСОК СЕРВЕРОВ ДЛЯ СИНХРОНИЗАЦИИ
    const gun = Gun([
        'https://gun-manhattan.herokuapp.com/gun',
        'https://relay.peer.ooo/gun',
        'https://gun-us.herokuapp.com/gun',
        'https://gun-eu.herokuapp.com/gun',
        'https://gunjs.herokuapp.com/gun'
    ]);
    const db = gun.get('ZIVO_PELMEN_STATION_X_10');

    let myNick = localStorage.getItem('p10_nick') || "User" + Math.floor(Math.random()*999);
    let myAva = localStorage.getItem('p10_ava') || "https://api.dicebear.com/7.x/pixel-art/svg?seed=" + myNick;
    let currentRoom = 'global';
    let replyData = null;
    let msgSet = new Set();
    let typeTimer;

    const DATA = {
        e: ['😀','😂','😍','🔥','🙌','🥟','💀','🚀','💻','🥋','❤️','👍','😮','🎉','✅','🎮','⚡','🌈','🧊','🔋'],
        s: ['https://sticker-stickers.ru/wp-content/uploads/2021/03/sticker_vk_pelmen_001.png', 'https://item.onlineshop.su/1/2/4/12474.jpg']
    };

    setInterval(() => db.get('presence').get(myNick).put({t: Date.now(), n: myNick, a: myAva}), 4000);
    db.get('presence').map().on((u, id) => {
        if(!u || u.n === myNick) return;
        let el = document.getElementById('u-'+id);
        if(!el) {
            el = document.createElement('div'); el.id = 'u-'+id; el.className = 'u-card';
            el.innerHTML = `<img src="${u.a}" class="u-ava"><div class="u-info"><span class="u-name">${u.n}</span><span class="u-stat">Offline</span></div>`;
            el.onclick = () => join([myNick, u.n].sort().join('_'), u.n);
            document.getElementById('u-list').appendChild(el);
        }
        const on = (Date.now() - u.t) < 12000;
        el.classList.toggle('is-on', on);
        el.querySelector('.u-stat').innerText = on ? 'Online' : 'Offline';
    });

    document.getElementById('m-input').oninput = () => {
        db.get('typing').get(currentRoom).get(myNick).put(true);
        clearTimeout(typeTimer);
        typeTimer = setTimeout(() => db.get('typing').get(currentRoom).get(myNick).put(false), 2000);
    };
    db.get('typing').get(currentRoom).map().on((is, n) => {
        const span = document.getElementById('typing-status');
        span.innerText = (is && n !== myNick) ? n + ' печатает...' : '';
    });

    function createRoom() {
        const n = prompt("Название комнаты (дайте его другу):");
        if(n) {
            const id = n.replace(/\s+/g, '_').toLowerCase();
            join(id, "Комната: " + n);
        }
    }

    function send() {
        const inp = document.getElementById('m-input');
        if(!inp.value.trim()) return;
        db.get('rooms').get(currentRoom).get('msgs').set({
            n: myNick, a: myAva, body: inp.value, re: replyData,
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            ts: Date.now()
        });
        inp.value = ''; cancelRe();
    }

    function render(data, id) {
        if(!data || !data.n || msgSet.has(id)) return; msgSet.add(id);
        const me = data.n === myNick;
        const wrap = document.createElement('div'); wrap.className = `m-wrap ${me?'me':''}`;
        wrap.ondblclick = () => {
            replyData = { who: data.n, text: data.body };
            document.getElementById('re-preview').style.display = 'block';
            document.getElementById('re-who').innerText = "Ответ " + data.n;
            document.getElementById('re-txt').innerText = data.body;
        };
        wrap.innerHTML = `
            <img src="${data.a}" class="u-ava">
            <div class="m-bub">
                <div class="m-meta">${data.n} • ${data.time}</div>
                ${data.re ? `<div class="m-re-box"><b>${data.re.who}:</b> ${data.re.text}</div>` : ''}
                <div style="word-break: break-word;">${data.body}</div>
                ${data.img ? `<img src="${data.img}" style="max-width:100%; border-radius:15px; margin-top:10px; display:block;">` : ''}
            </div>`;
        document.getElementById('msgs').appendChild(wrap);
        document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
    }

    function join(id, title) {
        currentRoom = id; msgSet.clear();
        document.getElementById('room-title').innerText = title;
        document.getElementById('msgs').innerHTML = '';
        db.get('rooms').get(id).get('msgs').map().on(render);
    }

    function handleFile(input, mode) {
        const f = input.files[0];
        const r = new FileReader();
        r.onload = (e) => {
            if(mode === 'ava') { myAva = e.target.result; document.getElementById('m-preview').src = e.target.result; }
            else { db.get('rooms').get(currentRoom).get('msgs').set({ n:myNick, a:myAva, body:'[Фото]', img:e.target.result, time:new Date().toLocaleTimeString() }); }
        };
        r.readAsDataURL(f);
    }

    function toggleEm() { const p = document.getElementById('emoji-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; if(p.style.display==='block') drawEm('e'); }
    function drawEm(t) {
        const g = document.getElementById('em-grid'); g.innerHTML = '';
        DATA[t].forEach(i => {
            const d = document.createElement('div'); d.style.cursor='pointer';
            if(t==='e') { d.innerText = i; d.style.fontSize='24px'; d.onclick=()=>document.getElementById('m-input').value+=i; }
            else { d.innerHTML=`<img src="${i}" width="100%">`; d.onclick=()=>db.get('rooms').get(currentRoom).get('msgs').set({n:myNick, a:myAva, img:i, body:'[Стикер]', time:new Date().toLocaleTimeString()}); }
            g.appendChild(d);
        });
    }

    function chatSearch(q) {
        document.querySelectorAll('.m-wrap').forEach(m => m.style.display = m.innerText.toLowerCase().includes(q.toLowerCase()) ? 'flex' : 'none');
    }

    function cancelRe() { replyData = null; document.getElementById('re-preview').style.display='none'; }
    function toggleWin(s) { document.getElementById('settings-win').style.display = s ? 'flex' : 'none'; if(s) { document.getElementById('m-nick-field').value=myNick; document.getElementById('m-preview').src=myAva; } }
    function saveProfile() { myNick = document.getElementById('m-nick-field').value; localStorage.setItem('p10_nick', myNick); localStorage.setItem('p10_ava', myAva); location.reload(); }

    document.getElementById('m-input').addEventListener('keydown', (e) => { if(e.key === 'Enter') send(); });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('data:text/javascript,self.addEventListener("fetch", function(e){});');
    }

    join('global', 'Общий чат');
</script>
</body>
</html>
